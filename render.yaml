version: 2

services:
  - type: web
    name: quiz-battle-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        scope: all
        value: ${{ secrets.MONGODB_URI }}
      - key: JWT_SECRET
        scope: all
        value: ${{ secrets.JWT_SECRET }}
      - key: CORS_ORIGIN
        scope: all
        value: ${{ secrets.CORS_ORIGIN }}
      - key: OPENAI_API_KEY
        scope: all
        value: ${{ secrets.OPENAI_API_KEY }}
      - key: NODE_ENV
        scope: all
        value: production

  - type: static
    name: quiz-battle-frontend
    buildCommand: npm run build
    outputDir: build
    envVars:
      - key: REACT_APP_API_URL
        scope: all
        value: ${{ services.quiz-battle-backend.url }}/api
      - key: REACT_APP_SOCKET_URL
        scope: all
        value: ${{ services.quiz-battle-backend.url }}
