apiVersion: v1
kind: List
metadata:
  name: quiz-battle-backend
items:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: quiz-battle-api
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: quiz-battle-api
      template:
        metadata:
          labels:
            app: quiz-battle-api
        spec:
          containers:
            - name: api
              image: node:18-alpine
              ports:
                - containerPort: 5000
              env:
                - name: PORT
                  value: "5000"
                - name: MONGODB_URI
                  valueFrom:
                    secretKeyRef:
                      name: quiz-battle-secrets
                      key: mongodb-uri
                - name: JWT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: quiz-battle-secrets
                      key: jwt-secret
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"

  - apiVersion: v1
    kind: Service
    metadata:
      name: quiz-battle-api-service
    spec:
      selector:
        app: quiz-battle-api
      ports:
        - protocol: TCP
          port: 5000
          targetPort: 5000
      type: LoadBalancer
